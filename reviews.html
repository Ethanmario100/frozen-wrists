  pa.forEach(pn=>{if(pn==='...')h+='<span class="page-dots">&#183;&#183;&#183;</span>';else h+='<span class="page-btn'+(pn===pg2?' active':'')+'" data-page="'+pn+'" data-m="a">'+pn+'</span>'});

  c.style.opacity='0';c.innerHTML=h;c.offsetHeight;c.style.transition='opacity 0.2s ease';c.style.opacity='1';setTimeout(()=>{c.style.transition=''},250)

}
